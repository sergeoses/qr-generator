<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Генератор 3000x3000 px</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #6c757d; cursor: not-allowed; }
        #preview { margin-top: 20px; max-width: 100%; border: 1px solid #eee; display: none; border-radius: 8px; }
        #instruction { margin-top: 10px; font-size: 14px; color: #28a745; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Створення QR-коду</h2>

    <input type="text" id="urlInput" placeholder="Введіть посилання" />
    <button id="generateBtn">Згенерувати</button>

    <p id="instruction">Готово! Затисніть картинку пальцем, щоб зберегти її в галерею.</p>
    <img id="preview" alt="QR-код" />

    <script>
        document.getElementById('generateBtn').addEventListener('click', function() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('generateBtn');
            const previewImg = document.getElementById('preview');
            const instruction = document.getElementById('instruction');

            if (!url) {
                alert('Помилка: введіть посилання.');
                return;
            }

            // Індикація процесу для користувача
            btn.innerText = 'Зачекайте, генерується...';
            btn.disabled = true;
            previewImg.style.display = 'none';
            instruction.style.display = 'none';

            // Використання Canvas для оптимізації пам'яті
            const canvas = document.createElement('canvas');
            const options = {
                errorCorrectionLevel: 'H',
                width: 3000,
                margin: 2,
                color: { dark: "#000000", light: "#ffffff" }
            };

            // Затримка 100мс, щоб браузер встиг оновити текст на кнопці
            setTimeout(() => {
                QRCode.toCanvas(canvas, url, options, function (err) {
                    if (err) {
                        console.error(err);
                        alert('Сталася помилка при генерації.');
                        btn.innerText = 'Згенерувати';
                        btn.disabled = false;
                        return;
                    }

                    // Конвертація у Blob замість Data URL (вирішує проблему з пам'яттю)
                    canvas.toBlob(function(blob) {
                        const blobUrl = URL.createObjectURL(blob);
                        
                        // Виведення на екран
                        previewImg.src = blobUrl;
                        previewImg.style.display = 'block';
                        instruction.style.display = 'block';

                        // Спроба автозавантаження
                        try {
                            const downloadLink = document.createElement('a');
                            downloadLink.href = blobUrl;
                            downloadLink.download = 'qrcode_3000x3000.jpg';
                            document.body.appendChild(downloadLink);
                            downloadLink.click();
                            document.body.removeChild(downloadLink);
                        } catch (e) {
                            console.log('Автозавантаження заблоковано мобільним браузером');
                        }

                        // Повернення кнопки у початковий стан
                        btn.innerText = 'Згенерувати';
                        btn.disabled = false;
                    }, 'image/jpeg', 1.0);
                });
            }, 100);
        });
    </script>

</body>
</html>

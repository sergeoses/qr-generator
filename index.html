<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Генератор 3000x3000</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; text-align: center; }
        input, button { width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; border-radius: 6px; font-size: 16px; }
        input { border: 1px solid #ccc; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #6c757d; }
        #preview { margin-top: 20px; max-width: 100%; display: none; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #instruction { margin-top: 15px; font-size: 14px; color: #d9534f; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Генератор QR (3000x3000)</h2>

    <input type="text" id="urlInput" placeholder="Введіть посилання" />
    <button id="generateBtn">Згенерувати</button>

    <p id="instruction">Готово! Затисніть зображення, щоб зберегти його.</p>
    <img id="preview" alt="QR-код" />

    <script>
        document.getElementById('generateBtn').addEventListener('click', function() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('generateBtn');
            const previewImg = document.getElementById('preview');
            const instruction = document.getElementById('instruction');

            if (!url) {
                alert('Введіть посилання');
                return;
            }

            btn.innerText = 'Генерується...';
            btn.disabled = true;
            previewImg.style.display = 'none';
            instruction.style.display = 'none';

            // Генерація базового розміру для уникнення зависання
            const tempCanvas = document.createElement('canvas');
            QRCode.toCanvas(tempCanvas, url, { errorCorrectionLevel: 'H', margin: 2, width: 500 }, function (err) {
                if (err) {
                    alert('Помилка генерації');
                    btn.innerText = 'Згенерувати';
                    btn.disabled = false;
                    return;
                }

                // Масштабування до 3000x3000
                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = 3000;
                finalCanvas.height = 3000;
                const ctx = finalCanvas.getContext('2d');

                // Вимкнення згладжування для чіткості країв
                ctx.imageSmoothingEnabled = false;

                // Білий фон для JPG
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, 3000, 3000);

                // Перенесення зображення
                ctx.drawImage(tempCanvas, 0, 0, 500, 500, 0, 0, 3000, 3000);

                // Конвертація у JPG
                finalCanvas.toBlob(function(blob) {
                    const blobUrl = URL.createObjectURL(blob);
                    previewImg.src = blobUrl;
                    previewImg.style.display = 'block';
                    instruction.style.display = 'block';

                    btn.innerText = 'Згенерувати';
                    btn.disabled = false;
                }, 'image/jpeg', 1.0);
            });
        });
    </script>

</body>
</html>
